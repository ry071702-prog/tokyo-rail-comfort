# CI: push / PR ごとに lint・型・テスト・ビルドを回す
# ODPT キーや Supabase が未設定でも通る (モックにフォールバックする設計のため)
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一ブランチの古い実行はキャンセルする
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
